name = "cnp-gallery"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
# OpenNext-generated entry. `opennextjs-cloudflare build` produces this file; it
# exports the `fetch` handler plus the Durable Object classes (incl.
# DOShardedTagCache for the tag cache). The "更新" sync runs synchronously inside
# the refresh API route, so no custom Worker / Queue consumer is needed.
main = ".open-next/worker.js"

# Custom domain on the syou.io zone (same Cloudflare account). Cloudflare
# auto-provisions the DNS record + TLS cert on deploy. Required for images:
# /cdn-cgi/image/ transformations run only on a zone with Image Transformations
# enabled — not on *.workers.dev.
routes = [
  { pattern = "cnp-gallery.syou.io", custom_domain = true }
]

# Static assets (CSS, JS chunks) live in .open-next/assets and are served via
# Cloudflare Workers Static Assets. Without this binding every /_next/static/*
# request 404s — unstyled page and no client hydration.
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# database_id is intentionally a PLACEHOLDER and must stay one in git — this repo
# is public. The real id is injected at deploy time by `scripts/deploy.mjs`, which
# copies this file to a gitignored `wrangler.generated.toml` with the placeholder
# replaced by $CLOUDFLARE_D1_DATABASE_ID (or $D1_DATABASE_ID) and deploys against
# that copy. For local `wrangler ... --local` the placeholder is fine (D1 runs in
# a local SQLite sandbox and ignores the id). See README "CI/CD / Deploy".
[[d1_databases]]
binding = "DB"
database_name = "cnp-gallery"
database_id = "__D1_DATABASE_ID__"

# --- OpenNext caching backends (see open-next.config.ts) ---

# Incremental cache store. The R2 incremental cache persists the cached values
# that revalidateTag busts. Create the bucket before deploying:
#   npx wrangler r2 bucket create cnp-gallery-cache
# (you may rename it; keep this binding name as-is — OpenNext looks it up).
[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "cnp-gallery-cache"

# Sharded Durable Object tag cache. revalidateTag writes here; cache reads
# consult it. DOShardedTagCache is exported by the generated .open-next/worker.js
# (the wrangler `main`). Durable Objects deploy WITH the Worker — no resource to
# create beforehand.
[[durable_objects.bindings]]
name = "NEXT_TAG_CACHE_DO_SHARDED"
class_name = "DOShardedTagCache"

# Durable Objects backed by SQL storage must be declared in a migration.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["DOShardedTagCache"]
